<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ JutsuFlow - AI Hand Drawing Studio ✨</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }

    /* Webcam with blur effect for better focus on drawing */
    #v_src {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.25;
 filter: blur(4px);
      z-index: 1;
    }

    /* Drawing canvas with enhanced rendering */
    #drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      cursor: none;
    }

    /* Skeleton overlay with glow */
    #skeleton-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 15;
      pointer-events: none;
    }

    /* Premium UI Panel */
    .premium-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 15px 25px;
      z-index: 50;
      border: 1px solid rgba(255, 215, 0, 0.3);
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
      align-items: center;
      font-family: monospace;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .tool-group {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.05);
      padding: 8px 16px;
      border-radius: 50px;
    }

    .tool-btn {
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      border: 1px solid #ff9900;
      color: #ffde9c;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 14px;
    }

    .tool-btn.active {
      background: linear-gradient(135deg, #ff9900, #ff5500);
      color: white;
      box-shadow: 0 0 15px #ff9900;
    }

    .color-palette {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-swatch {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.2s;
      position: relative;
    }

    .color-swatch:hover {
      transform: scale(1.15);
      border-color: white;
    }

    .color-swatch.active {
      border: 3px solid #ffdd00;
      transform: scale(1.2);
      box-shadow: 0 0 15px currentColor;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 40px;
    }

    input[type="range"] {
      width: 140px;
      cursor: pointer;
      height: 4px;
      border-radius: 5px;
      background: #ff9900;
    }

    .feature-badge {
      background: linear-gradient(135deg, #ff3366, #ff6633);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .gesture-hud {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 12px 18px;
      border-radius: 20px;
      color: #ffde9c;
      font-size: 12px;
      z-index: 50;
      border-right: 3px solid #ff9900;
      pointer-events: none;
      font-family: monospace;
      text-align: right;
    }

    .gesture-hud h4 {
      margin-bottom: 8px;
      color: #ff9900;
    }

    .instruction-top {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px);
      padding: 12px 24px;
      border-radius: 50px;
      color: white;
      font-size: 14px;
      z-index: 50;
      text-align: center;
      white-space: nowrap;
      border: 1px solid #ff9900;
      font-weight: bold;
      letter-spacing: 1px;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .premium-panel { flex-direction: column; align-items: stretch; padding: 15px; }
      .tool-group { justify-content: center; flex-wrap: wrap; }
      .instruction-top { font-size: 10px; white-space: normal; width: 85%; }
      .gesture-hud { top: auto; bottom: 120px; right: 10px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <video id="v_src" autoplay playsinline></video>
  <canvas id="drawing-canvas"></canvas>
  <canvas id="skeleton-canvas"></canvas>

  <div class="instruction-top">
    🎨 AI STABILIZED DRAWING • TRENDING FEATURES ACTIVE 🎨
  </div>

  <div class="gesture-hud">
    <h4>🎮 GESTURE CONTROLS</h4>
    ☝️ INDEX FINGER → DRAW<br>
    ✊ FIST → ERASE<br>
    ✌️ PEACE SIGN → RAINBOW MODE<br>
    🤘 HORN SIGN → GLOW EFFECT<br>
    🖐️ OPEN HAND → STOP<br>
    👌 OK SIGN → CLEAR CANVAS
  </div>

  <div class="premium-panel">
    <div class="tool-group">
      <div class="tool-btn" data-mode="draw">🎨 DRAW</div>
      <div class="tool-btn" data-mode="erase">🧽 ERASE</div>
      <div class="tool-btn" data-mode="rainbow">🌈 RAINBOW</div>
      <div class="tool-btn" data-mode="glow">✨ GLOW</div>
    </div>
    
    <div class="color-palette" id="color-palette">
      <div class="color-swatch" style="background: #ff3366;" data-color="#ff3366"></div>
      <div class="color-swatch" style="background: #33ff66;" data-color="#33ff66"></div>
      <div class="color-swatch" style="background: #3366ff;" data-color="#3366ff"></div>
      <div class="color-swatch" style="background: #ffcc00;" data-color="#ffcc00"></div>
      <div class="color-swatch" style="background: #ff00ff;" data-color="#ff00ff"></div>
      <div class="color-swatch" style="background: #00ffff;" data-color="#00ffff"></div>
      <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
    </div>
    
    <div class="slider-group">
      <span>✏️ SIZE</span>
      <input type="range" id="brush-size" min="2" max="60" value="12">
      <span id="size-value">12</span>
    </div>
    
    <div class="slider-group">
      <span>🛡️ STABILIZE</span>
      <input type="range" id="stabilizer" min="0" max="20" value="8">
      <span id="stabilizer-value">8</span>
    </div>
    
    <div class="feature-badge">
      🔥 AI SMOOTHING ACTIVE
    </div>
  </div>

  <script>
    // Canvas elements
    const drawingCanvas = document.getElementById('drawing-canvas');
    const drawingCtx = drawingCanvas.getContext('2d');
    const skeletonCanvas = document.getElementById('skeleton-canvas');
    const skeletonCtx = skeletonCanvas.getContext('2d');
    const videoElement = document.getElementById('v_src');
    
    // Drawing state with stabilization
    let currentMode = 'draw';
    let currentColor = '#ff3366';
    let brushSize = 12;
    let stabilizerStrength = 8; // 0-20, higher = more stable
    
    // Stabilization queue for smooth drawing
    let pointsQueue = [];
    let lastDrawPoint = null;
    let isDrawing = false;
    
    // Rainbow mode variables
    let rainbowHue = 0;
    let glowIntensity = 0;
    
    // Gesture cooldown
    let lastGestureTime = 0;
    const GESTURE_COOLDOWN = 400;
    
    // Setup canvas
    function resizeCanvases() {
      drawingCanvas.width = window.innerWidth;
      drawingCanvas.height = window.innerHeight;
      skeletonCanvas.width = window.innerWidth;
      skeletonCanvas.height = window.innerHeight;
      
      drawingCtx.lineCap = 'round';
      drawingCtx.lineJoin = 'round';
      drawingCtx.imageSmoothingEnabled = true;
    }
    
    window.addEventListener('resize', () => {
      const imageData = drawingCtx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
      resizeCanvases();
      drawingCtx.putImageData(imageData, 0, 0);
    });
    
    // Advanced smoothing algorithm (weighted moving average)
    function smoothPoint(newPoint, previousPoint, strength) {
      if (!previousPoint) return newPoint;
      const smoothFactor = Math.min(0.9, strength / 10);
      return {
        x: previousPoint.x * smoothFactor + newPoint.x * (1 - smoothFactor),
        y: previousPoint.y * smoothFactor + newPoint.y * (1 - smoothFactor)
      };
    }
    
    // Add point to queue for stabilization
    function addPoint(x, y) {
      pointsQueue.push({ x, y, timestamp: Date.now() });
      if (pointsQueue.length > stabilizerStrength + 2) {
        pointsQueue.shift();
      }
    }
    
    // Get stabilized point (average of recent points)
    function getStabilizedPoint() {
      if (pointsQueue.length === 0) return null;
      
      let sumX = 0, sumY = 0;
      let totalWeight = 0;
      
      // Weighted average - newer points have more weight
      pointsQueue.forEach((point, index) => {
        const weight = Math.pow(1.2, index);
        sumX += point.x * weight;
        sumY += point.y * weight;
        totalWeight += weight;
      });
      
      return {
        x: sumX / totalWeight,
        y: sumY / totalWeight
      };
    }
    
    // Drawing functions with stabilization
    function startDrawing(x, y) {
      isDrawing = true;
      pointsQueue = [];
      addPoint(x, y);
      
      const stabilized = getStabilizedPoint();
      if (stabilized) {
        lastDrawPoint = stabilized;
        drawPoint(stabilized.x, stabilized.y);
      }
    }
    
    function continueDrawing(x, y) {
      if (!isDrawing) return;
      
      addPoint(x, y);
      const stabilized = getStabilizedPoint();
      
      if (stabilized && lastDrawPoint) {
        // Apply smoothing between points
        const smoothed = smoothPoint(stabilized, lastDrawPoint, stabilizerStrength / 10);
        
        if (currentMode === 'rainbow') {
          rainbowHue = (rainbowHue + 3) % 360;
          drawingCtx.strokeStyle = `hsl(${rainbowHue}, 100%, 60%)`;
        } else if (currentMode === 'glow') {
          drawingCtx.shadowBlur = 15;
          drawingCtx.shadowColor = currentColor;
          drawingCtx.strokeStyle = currentColor;
        } else {
          drawingCtx.shadowBlur = 0;
          drawingCtx.strokeStyle = currentColor;
        }
        
        drawingCtx.lineWidth = brushSize;
        drawingCtx.beginPath();
        drawingCtx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
        drawingCtx.lineTo(smoothed.x, smoothed.y);
        drawingCtx.stroke();
        
        lastDrawPoint = smoothed;
      }
    }
    
    function drawPoint(x, y) {
      drawingCtx.beginPath();
      drawingCtx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
      
      if (currentMode === 'rainbow') {
        drawingCtx.fillStyle = `hsl(${rainbowHue}, 100%, 60%)`;
      } else if (currentMode === 'glow') {
        drawingCtx.shadowBlur = 15;
        drawingCtx.shadowColor = currentColor;
        drawingCtx.fillStyle = currentColor;
      } else {
        drawingCtx.fillStyle = currentColor;
      }
      
      drawingCtx.fill();
    }
    
    function stopDrawing() {
      isDrawing = false;
      pointsQueue = [];
      lastDrawPoint = null;
      drawingCtx.shadowBlur = 0;
    }
    
    function erase(x, y, size) {
      drawingCtx.save();
      drawingCtx.globalCompositeOperation = 'destination-out';
      drawingCtx.beginPath();
      drawingCtx.arc(x, y, size, 0, Math.PI * 2);
      drawingCtx.fill();
      drawingCtx.restore();
    }
    
    function clearCanvas() {
      drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
      showToast('✨ Canvas Cleared! ✨', '#ff00ff');
    }
    
    // Advanced gesture detection with confidence
    function detectAdvancedGestures(landmarks) {
      // Get fingertip positions
      const fingers = {
        thumb: landmarks[4],
        index: landmarks[8],
        middle: landmarks[12],
        ring: landmarks[16],
        pinky: landmarks[20]
      };
      
      const mcp = {
        index: landmarks[5],
        middle: landmarks[9],
        ring: landmarks[13],
        pinky: landmarks[17]
      };
      
      // Detect extended fingers (tip y < mcp y for vertical)
      const isExtended = {
        index: fingers.index.y < mcp.index.y - 0.02,
        middle: fingers.middle.y < mcp.middle.y - 0.02,
        ring: fingers.ring.y < mcp.ring.y - 0.02,
        pinky: fingers.pinky.y < mcp.pinky.y - 0.02
      };
      
      const extendedCount = Object.values(isExtended).filter(Boolean).length;
      
      // Detect specific gestures
      const isIndexOnly = isExtended.index && !isExtended.middle && !isExtended.ring && !isExtended.pinky;
      const isPeaceSign = isExtended.index && isExtended.middle && !isExtended.ring && !isExtended.pinky;
      const isHornSign = isExtended.index && isExtended.pinky && !isExtended.middle && !isExtended.ring;
      const isFist = extendedCount === 0;
      const isOkSign = Math.hypot(fingers.thumb.x - fingers.index.x, fingers.thumb.y - fingers.index.y) < 0.05;
      
      // Get pointer position (index fingertip)
      const pointerX = (1 - fingers.index.x) * window.innerWidth;
      const pointerY = fingers.index.y * window.innerHeight;
      
      const now = Date.now();
      
      // Handle gestures with cooldown
      if (isFist) {
        // Fist = erase mode
        if (currentMode !== 'erase') {
          currentMode = 'erase';
          updateModeUI();
          showToast('🧽 Eraser Mode Active', '#ff6600');
        }
        if (isDrawing) {
          erase(pointerX, pointerY, brushSize * 1.5);
          continueDrawing(pointerX, pointerY);
        } else {
          startDrawing(pointerX, pointerY);
          erase(pointerX, pointerY, brushSize * 1.5);
        }
      } 
      else if (isIndexOnly) {
        // Index finger = draw mode
        if (currentMode !== 'draw') {
          currentMode = 'draw';
          updateModeUI();
          showToast('✍️ Drawing Mode Active', '#33ff66');
        }
        if (isDrawing) {
          continueDrawing(pointerX, pointerY);
        } else {
          startDrawing(pointerX, pointerY);
        }
      }
      else if (isPeaceSign && now - lastGestureTime > GESTURE_COOLDOWN) {
        // Peace sign = rainbow mode
        if (currentMode !== 'rainbow') {
          currentMode = 'rainbow';
          updateModeUI();
          showToast('🌈 Rainbow Mode Activated! 🌈', '#ff00ff');
          lastGestureTime = now;
        }
        stopDrawing();
      }
      else if (isHornSign && now - lastGestureTime > GESTURE_COOLDOWN) {
        // Horn sign = glow mode
        if (currentMode !== 'glow') {
          currentMode = 'glow';
          updateModeUI();
          showToast('✨ Glow Effect Active! ✨', '#00ffff');
          lastGestureTime = now;
        }
        stopDrawing();
      }
      else if (isOkSign && now - lastGestureTime > GESTURE_COOLDOWN) {
        // OK sign = clear canvas
        clearCanvas();
        lastGestureTime = now;
        stopDrawing();
      }
      else {
        // No drawing gesture
        if (isDrawing) stopDrawing();
      }
      
      return { x: pointerX, y: pointerY, isDrawing: isIndexOnly && !isFist };
    }
    
    // Toast notification system
    function showToast(message, color) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.position = 'fixed';
      toast.style.bottom = '100px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.backgroundColor = `rgba(0,0,0,0.9)`;
      toast.style.color = color;
      toast.style.padding = '12px 24px';
      toast.style.borderRadius = '50px';
      toast.style.border = `2px solid ${color}`;
      toast.style.zIndex = '100';
      toast.style.fontWeight = 'bold';
      toast.style.fontSize = '14px';
      toast.style.backdropFilter = 'blur(10px)';
      toast.style.animation = 'fadeInOut 1.5s ease';
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 1500);
    }
    
    // Add CSS for toast animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeInOut {
        0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        15% { opacity: 1; transform: translateX(-50%) translateY(0); }
        85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      }
    `;
    document.head.appendChild(style);
    
    // Process MediaPipe results
    function onResults(results) {
      if (!videoElement.videoWidth) return;
      
      skeletonCtx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
      
      if (results.multiHandLandmarks && results.multiHandedness) {
        results.multiHandLandmarks.forEach((landmarks, idx) => {
          const handedness = results.multiHandedness[idx].label;
          
          // Draw beautiful skeleton
          skeletonCtx.save();
          skeletonCtx.shadowBlur = 8;
          skeletonCtx.shadowColor = '#00fbff';
          
          if (typeof drawConnectors !== 'undefined' && typeof HAND_CONNECTIONS !== 'undefined') {
            drawConnectors(skeletonCtx, landmarks, HAND_CONNECTIONS, {
              color: handedness === 'Right' ? '#00a6ff' : '#ff9900',
              lineWidth: 2.5
            });
          }
          
          if (typeof drawLandmarks !== 'undefined') {
            drawLandmarks(skeletonCtx, landmarks, {
              color: '#ffffff',
              lineWidth: 1,
              radius: 4
            });
          }
          
          skeletonCtx.restore();
          
          // Detect gestures and draw with stabilization
          detectAdvancedGestures(landmarks);
        });
      } else {
        if (isDrawing) stopDrawing();
      }
    }
    
    // UI Updates
    function updateModeUI() {
      document.querySelectorAll('.tool-btn').forEach(btn => {
        const mode = btn.dataset.mode;
        if (mode === currentMode) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }
    
    function updateColorUI() {
      document.querySelectorAll('.color-swatch').forEach(swatch => {
        const color = swatch.dataset.color;
        if (color === currentColor) {
          swatch.classList.add('active');
        } else {
          swatch.classList.remove('active');
        }
      });
    }
    
    // Initialize MediaPipe Hands
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });
    
    hands.onResults(onResults);
    
    // Start camera
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 1280,
      height: 720
    });
    
    camera.start();
    
    // Setup UI event listeners
    function setupUI() {
      document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentMode = btn.dataset.mode;
          if (currentMode === 'draw') currentColor = '#ff3366';
          updateModeUI();
          showToast(`${currentMode.toUpperCase()} Mode Activated`, '#ff9900');
        });
      });
      
      document.querySelectorAll('.color-swatch').forEach(swatch => {
        swatch.addEventListener('click', () => {
          currentColor = swatch.dataset.color;
          if (currentMode !== 'draw' && currentMode !== 'glow') {
            currentMode = 'draw';
            updateModeUI();
          }
          updateColorUI();
          showToast(`Color Changed`, currentColor);
        });
      });
      
      const brushSlider = document.getElementById('brush-size');
      const sizeValue = document.getElementById('size-value');
      brushSlider.addEventListener('input', (e) => {
        brushSize = parseInt(e.target.value);
        sizeValue.textContent = brushSize;
      });
      
      const stabilizerSlider = document.getElementById('stabilizer');
      const stabilizerValue = document.getElementById('stabilizer-value');
      stabilizerSlider.addEventListener('input', (e) => {
        stabilizerStrength = parseInt(e.target.value);
        stabilizerValue.textContent = stabilizerStrength;
      });
    }
    
    // Initialize
    resizeCanvases();
    setupUI();
    updateModeUI();
    updateColorUI();
    
    // Set initial drawing style
    drawingCtx.lineCap = 'round';
    drawingCtx.lineJoin = 'round';
    
    console.log('🎨 JutsuFlow Studio Ready! Advanced stabilization active!');
  </script>
</body>
</html>
